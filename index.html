<style>
/* ==========================================================================
   CHEMCLAK — style.css
   Palet: biru laut, putih bersih, abu lembut + aksen hijau/oranye/ungu
   Signature element: papan congklak kayu 3D dengan kulit warna-warni
   ========================================================================== */

/* ---------- 1. RESET & BASE ---------- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue: #D9A441;
  --blue-dark: #B9812A;
  --blue-deep: #F0C775;
  --blue-light: #ECC876;
  --blue-mist: rgba(217, 164, 65, 0.14);
  --green: #4CAE7F;
  --green-dark: #2F8F62;
  --orange: #D9723B;
  --orange-dark: #B6572A;
  --purple: #8B5A8C;
  --purple-dark: #6B4270;
  --teal: #2F8F82;
  --red: #C1443B;

  --kulit-k: #C1443B;
  --kulit-l: #D9843B;
  --kulit-m: #D9A441;
  --kulit-n: #4CAE7F;
  --kulit-o: #2F8F82;
  --kulit-p: #6C6BAE;
  --kulit-q: #8B5A8C;

  --wood-1: #140D08;
  --wood-2: #2B1B10;
  --wood-3: #4A2E18;
  --wood-4: #6B4423;
  --wood-5: #93643A;

  --bg-app: #150F09;
  --card-white: rgba(42, 28, 17, 0.72);
  --text-dark: #F3E7D3;
  --text-muted: #C9AE8C;
  --text-faint: #93795C;
  --border-soft: rgba(217, 164, 65, 0.18);
  --surface-1: #120C07;
  --surface-2: #241609;
  --surface-glass: rgba(35, 22, 12, 0.62);
  --line-glow: rgba(217, 164, 65, 0.35);

  --shadow-sm: 0 2px 10px rgba(10, 6, 2, 0.4);
  --shadow-md: 0 10px 30px rgba(10, 6, 2, 0.5), 0 0 0 1px rgba(217,164,65,.05);
  --shadow-lg: 0 24px 60px rgba(6, 3, 1, 0.6), 0 0 40px rgba(217, 164, 65, 0.08);
  --glow-cyan: 0 0 18px rgba(217, 164, 65, 0.45), 0 0 36px rgba(217, 164, 65, 0.15);
  --glow-purple: 0 0 18px rgba(139, 90, 140, 0.45), 0 0 36px rgba(139, 90, 140, 0.15);
  --glow-green: 0 0 18px rgba(76, 174, 127, 0.5), 0 0 36px rgba(76, 174, 127, 0.16);
  
  --radius-sm: 10px; --radius-md: 16px; --radius-lg: 22px; --radius-pill: 999px;

  --font-display: 'Fraunces', 'Nunito', serif;
  --font-ui: 'Nunito', sans-serif;
  --font-body: 'Nunito', sans-serif;
  --font-mono: 'JetBrains Mono', 'Courier New', monospace;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background:
    radial-gradient(ellipse 90% 60% at 15% -10%, rgba(217,164,65,.14), transparent 60%),
    radial-gradient(ellipse 70% 50% at 100% 0%, rgba(139,90,140,.14), transparent 60%),
    radial-gradient(ellipse 60% 50% at 50% 100%, rgba(76,174,127,.08), transparent 60%),
    var(--bg-app);
  background-attachment: fixed;
  color: var(--text-dark);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  position: relative;
}

h1, h2, h3, h4 { font-family: var(--font-display); font-weight: 700; line-height: 1.25; letter-spacing: .01em; }
button, input { font-family: inherit; font-size: inherit; color: inherit; }
button { cursor: pointer; border: none; background: none; }
input { border: none; outline: none; }
ul, ol { list-style: none; }
table { border-collapse: collapse; width: 100%; }

a:focus-visible, button:focus-visible, input:focus-visible, [tabindex]:focus-visible {
  outline: 3px solid var(--blue-light); outline-offset: 2px; border-radius: 6px;
}

.hidden { display: none !important; }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px 22px; border-radius: var(--radius-pill);
  font-family: var(--font-display); font-weight: 600; font-size: 0.95rem;
  color: #fff; background: var(--blue); box-shadow: var(--shadow-sm);
  transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;
  white-space: nowrap;
}
.btn .icon { width: 18px; height: 18px; flex-shrink: 0; }
.btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-md), var(--glow-cyan); filter: brightness(1.08); }
.btn:active { transform: translateY(0); filter: brightness(0.97); }
.btn:disabled { opacity: .55; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-block { width: 100%; }

.btn-primary { background: linear-gradient(135deg, var(--blue), var(--blue-dark)); }
.btn-blue    { background: linear-gradient(135deg, var(--blue), var(--blue-dark)); }
.btn-green   { background: linear-gradient(135deg, #52B058, var(--green-dark)); }
.btn-gray    { background: linear-gradient(135deg, #90A0B4, #64748B); }
.btn-purple  { background: linear-gradient(135deg, #A238BC, var(--purple-dark)); }
.btn-orange  { background: linear-gradient(135deg, var(--orange), var(--orange-dark)); }
.btn-teal    { background: linear-gradient(135deg, #12A296, var(--teal)); }
.acak-btn    { background: linear-gradient(135deg, #FFB74D, var(--orange-dark)); }

.btn-outline { background: var(--surface-2); color: var(--text-dark); border: 2px solid var(--border-soft); box-shadow: none; }
.btn-outline.selected { border-color: var(--blue); background: var(--blue-mist); color: var(--blue-deep); }

.icon-btn {
  width: 42px; height: 42px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface-glass); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border: 1px solid var(--border-soft); color: var(--blue);
  box-shadow: var(--shadow-sm); transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
}
.icon-btn:hover { border-color: var(--line-glow); box-shadow: var(--glow-cyan); transform: translateY(-2px); }
.icon-btn svg { width: 20px; height: 20px; }
.link-btn { color: var(--blue); font-weight: 700; text-decoration: underline; }

/* ---------- MODAL / OVERLAY ---------- */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(15, 10, 5, 0.75);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; padding: 20px; animation: fadeIn .25s ease;
}

.modal-box {
  background: linear-gradient(165deg, rgba(45,29,17,.94), rgba(16,10,5,.96));
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  border: 1px solid var(--line-glow); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg); width: 100%; max-width: 420px;
  padding: 34px 32px; position: relative; max-height: 90vh; overflow-y: auto;
  animation: popIn .3s cubic-bezier(.2,.9,.3,1.2);
}
.help-box { max-width: 580px; }

.modal-close {
  position: absolute; top: 16px; right: 16px; width: 34px; height: 34px;
  border-radius: 50%; background: var(--surface-2); color: var(--text-muted);
  font-size: 1.4rem; line-height: 1; display: flex; align-items: center; justify-content: center;
  transition: all .2s ease;
}
.modal-close:hover { background: rgba(255,77,109,.15); color: var(--red); transform: rotate(90deg); }

.auth-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
.auth-logo-icon {
  width: 46px; height: 46px; border-radius: 14px;
  background: linear-gradient(135deg, var(--blue), var(--purple));
  display: flex; align-items: center; justify-content: center;
  color: #1F1006; flex-shrink: 0; box-shadow: var(--glow-cyan);
  animation: iconOrbit 6s ease-in-out infinite;
}
@keyframes iconOrbit { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(8deg); } }
.auth-logo-icon svg { width: 26px; height: 26px; }
.auth-logo strong { font-family: var(--font-display); font-size: 1.15rem; letter-spacing: .02em; display: block; }
.auth-logo small { color: var(--text-muted); font-size: .82rem; }

.auth-tabs { display: flex; background: var(--surface-2); border-radius: var(--radius-pill); padding: 4px; margin-bottom: 22px; }
.auth-tab {
  flex: 1; padding: 10px; border-radius: var(--radius-pill);
  font-family: var(--font-display); font-weight: 600; font-size: .85rem;
  color: var(--text-muted); transition: all .2s ease;
}
.auth-tab.active { background: var(--surface-2); color: var(--blue); box-shadow: var(--shadow-sm), inset 0 0 0 1px var(--line-glow); }

.auth-form { display: none; flex-direction: column; gap: 6px; }
.auth-form.active { display: flex; }
.auth-form label { font-size: .82rem; font-weight: 700; color: var(--text-muted); margin-top: 10px; }
.auth-form input {
  padding: 12px 14px; border: 2px solid var(--border-soft); border-radius: var(--radius-sm);
  background: var(--surface-2); color: var(--text-dark); transition: border-color .15s ease, box-shadow .15s ease;
}
.auth-form input:focus { border-color: var(--blue); }
.auth-form .btn { margin-top: 18px; }

.pw-field-wrap { position: relative; display: flex; }
.pw-field-wrap input { width: 100%; padding-right: 44px; }
.pw-toggle-btn {
  position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  border-radius: 50%; color: var(--text-muted); transition: color .15s ease, background .15s ease;
}
.pw-toggle-btn:hover { color: var(--blue-deep); background: var(--blue-mist); }
.pw-toggle-btn svg { width: 19px; height: 19px; }
.pw-toggle-btn .icon-eye-off { display: none; }
.pw-toggle-btn.is-visible .icon-eye { display: none; }
.pw-toggle-btn.is-visible .icon-eye-off { display: inline-flex; }
.auth-error { color: var(--red); font-size: .82rem; font-weight: 700; min-height: 1.1em; margin-top: 6px; }
.auth-success { color: var(--green); font-size: .82rem; font-weight: 700; min-height: 1.1em; margin-top: 6px; line-height: 1.4; }
.auth-switch { text-align: center; font-size: .85rem; color: var(--text-muted); margin-top: 14px; line-height: 1.5; }

.btn-spinner { width: 16px; height: 16px; border-radius: 50%; border: 2.5px solid rgba(255,255,255,.4); border-top-color: #fff; animation: spin .7s linear infinite; }

.help-content h3 { margin-top: 18px; margin-bottom: 6px; font-size: 1rem; color: var(--blue-deep); }
.help-content h3:first-child { margin-top: 4px; }
.help-content p { color: var(--text-muted); font-size: .92rem; line-height: 1.6; }
.help-content ul { display: flex; flex-direction: column; gap: 8px; margin: 6px 0; }
.help-content li { font-size: .9rem; line-height: 1.5; color: var(--text-dark); }

/* ---------- APP SHELL & SIDEBAR ---------- */
.app-shell { display: flex; min-height: 100vh; position: relative; z-index: 10; }

.sidebar {
  width: 250px; flex-shrink: 0;
  background: linear-gradient(180deg, rgba(16,18,42,.85), rgba(8,9,24,.95));
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-right: 1px solid var(--border-soft);
  display: flex; flex-direction: column; padding: 26px 18px;
  position: sticky; top: 0; height: 100vh; overflow-y: auto; z-index: 100;
}

.sidebar-logo { display: flex; align-items: center; gap: 12px; padding: 0 6px 24px; }
.sidebar-logo-icon {
  width: 44px; height: 44px; border-radius: 13px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--blue), var(--purple));
  color: #1F1006; display: flex; align-items: center; justify-content: center;
  box-shadow: var(--glow-cyan); animation: iconOrbit 6s ease-in-out infinite;
}
.sidebar-logo-icon svg { width: 26px; height: 26px; }
.sidebar-logo-text strong { font-family: var(--font-display); font-size: 1.2rem; letter-spacing: .04em; display: block; background: linear-gradient(90deg, var(--blue), var(--purple)); -webkit-background-clip: text; background-clip: text; color: transparent; }
.sidebar-logo-text small { font-size: .68rem; color: var(--text-muted); line-height: 1.35; }

.sidebar-nav { display: flex; flex-direction: column; gap: 6px; flex: 1; }
.nav-group-label {
  font-family: var(--font-ui); font-weight: 700; font-size: .66rem;
  letter-spacing: .12em; text-transform: uppercase; color: var(--text-faint);
  padding: 14px 14px 4px;
}
.nav-group-label:first-child { padding-top: 2px; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px; border-radius: var(--radius-sm);
  font-family: var(--font-display); font-weight: 600; font-size: .88rem;
  color: var(--text-muted); text-align: left;
  transition: background .18s ease, color .18s ease, transform .15s ease;
}
.nav-item .icon { width: 19px; height: 19px; flex-shrink: 0; }
.nav-item:hover { background: var(--blue-mist); color: var(--blue-deep); transform: translateX(4px); }
.nav-item.active { background: linear-gradient(135deg, var(--green), var(--green-dark)); color: #12200F; font-weight: 800; box-shadow: var(--shadow-sm), var(--glow-green); }

.sidebar-footer { margin-top: 18px; padding: 0 6px; }
.sidebar-progress-label { display: flex; justify-content: space-between; font-size: .72rem; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; }
.sidebar-toggle, .sidebar-scrim { display: none; }

/* ---------- TOPBAR ---------- */
.main-wrapper { flex: 1; min-width: 0; display: flex; flex-direction: column; }

.topbar {
  display: flex; align-items: center; gap: 18px; padding: 22px 32px;
  background: var(--surface-glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-soft); flex-wrap: wrap; position: sticky; top: 0; z-index: 90;
}
.topbar-title { flex: 1 1 260px; min-width: 200px; }
.topbar-title h1 { font-size: 1.3rem; color: var(--text-dark); }
.topbar-title p { font-size: .82rem; color: var(--text-muted); margin-top: 4px; max-width: 480px; line-height: 1.4; }

.element-card {
  display: flex; align-items: center; gap: 12px;
  background: linear-gradient(135deg, rgba(255,180,71,.14), rgba(255,122,26,.08));
  border: 1px solid rgba(255,180,71,.35); border-radius: var(--radius-md);
  padding: 9px 18px 9px 9px; box-shadow: var(--shadow-sm);
}
.element-symbol {
  width: 42px; height: 42px; border-radius: 11px;
  background: linear-gradient(145deg, #F0C775, #D9A441);
  color: #6B4A00; font-family: var(--font-mono); font-weight: 700; font-size: 1.15rem;
  display: flex; align-items: center; justify-content: center;
  box-shadow: inset 0 -3px 0 rgba(0,0,0,.12), 0 2px 5px rgba(0,0,0,.1);
}
.element-info { display: flex; flex-direction: column; line-height: 1.3; }
.element-info strong { font-family: var(--font-display); font-size: .95rem; }
.element-info small { font-size: .74rem; color: var(--text-muted); font-family: var(--font-mono); }

.topbar-actions { display: flex; gap: 10px; }
.profile-card {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface-2); border-radius: var(--radius-pill);
  padding: 6px 14px 6px 6px; border: 1px solid transparent;
  cursor: pointer; transition: border-color .18s ease, box-shadow .18s ease, transform .15s ease;
  position: relative;
}
.profile-card:hover { border-color: var(--line-glow); box-shadow: var(--glow-cyan); transform: translateY(-1px); }
.profile-card.is-open { border-color: var(--blue); box-shadow: var(--glow-cyan); }
.profile-avatar {
  width: 38px; height: 38px; border-radius: 50%;
  background: linear-gradient(145deg, var(--blue-light), var(--blue));
  color: #1F1006; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: var(--glow-cyan);
  overflow: hidden; position: relative;
}
.profile-avatar svg { width: 20px; height: 20px; }
.profile-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
.profile-text { display: flex; flex-direction: column; line-height: 1.35; }
.profile-text strong { font-size: .85rem; font-family: var(--font-display); }
.profile-text small { font-size: .72rem; color: var(--text-muted); display: flex; align-items: center; gap: 3px; }
.icon-star { width: 12px; height: 12px; color: #F9A825; }
.profile-chevron { width: 16px; height: 16px; color: var(--text-faint); flex-shrink: 0; transition: transform .2s ease; margin-left: 2px; }
.profile-card.is-open .profile-chevron { transform: rotate(180deg); color: var(--blue); }
.profile-logout {
  width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  color: var(--text-faint); transition: color .15s ease, background .15s ease; margin-left: 4px;
}
.profile-logout:hover { color: var(--red); background: rgba(255,77,109,.15); }
.profile-logout svg { width: 16px; height: 16px; }

/* ---------- ACCOUNT PREVIEW POPOVER ---------- */
.account-popover-layer { position: fixed; inset: 0; z-index: 1400; display: none; }
.account-popover-layer.show { display: block; animation: fadeIn .15s ease; }
.account-popover {
  position: absolute; top: 78px; right: 32px; width: 320px; max-width: calc(100vw - 32px);
  background: linear-gradient(165deg, rgba(45,29,17,.97), rgba(16,10,5,.98));
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  border: 1px solid var(--line-glow); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg); padding: 22px; max-height: calc(100vh - 100px); overflow-y: auto;
  animation: popIn .22s cubic-bezier(.2,.9,.3,1.2);
}
.acc-head { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 10px; padding-bottom: 16px; border-bottom: 1px solid var(--border-soft); margin-bottom: 16px; }
.acc-avatar-wrap { position: relative; width: 84px; height: 84px; }
.acc-avatar {
  width: 84px; height: 84px; border-radius: 50%; overflow: hidden;
  background: linear-gradient(145deg, var(--blue-light), var(--blue));
  display: flex; align-items: center; justify-content: center; color: #1F1006;
  box-shadow: var(--glow-cyan), 0 0 0 3px var(--surface-1), 0 0 0 4px var(--line-glow);
}
.acc-avatar svg { width: 40px; height: 40px; }
.acc-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
.acc-avatar-edit {
  position: absolute; bottom: -2px; right: -2px; width: 30px; height: 30px; border-radius: 50%;
  background: var(--blue); color: #fff; display: flex; align-items: center; justify-content: center;
  border: 3px solid var(--surface-1); box-shadow: var(--shadow-sm); transition: transform .15s ease, filter .15s ease;
}
.acc-avatar-edit:hover { transform: scale(1.08); filter: brightness(1.1); }
.acc-avatar-edit svg { width: 14px; height: 14px; }
.acc-name-row { display: flex; align-items: center; gap: 6px; }
.acc-name { font-family: var(--font-display); font-weight: 800; font-size: 1.05rem; }
.acc-name-edit { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text-faint); transition: color .15s ease, background .15s ease; }
.acc-name-edit:hover { color: var(--blue); background: var(--blue-mist); }
.acc-name-edit svg { width: 13px; height: 13px; }
.acc-name-input-row { display: none; align-items: center; gap: 6px; width: 100%; }
.acc-name-input-row.show { display: flex; }
.acc-name-input-row input {
  flex: 1; background: var(--surface-2); border: 1px solid var(--border-soft); border-radius: var(--radius-pill);
  padding: 7px 12px; font-size: .82rem; color:
